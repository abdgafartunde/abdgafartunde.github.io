---
layout: default
---

<article class="page-article{% if page.page_class %} {{ page.page_class }}{% endif %}">
    {% if page.title and page.title != "" %}
        <header class="page-header">
            <p class="page-kicker">{{ page.eyebrow | default: "A.T. Tiamiyu" }}</p>
            <h1>{{ page.title }}</h1>
            {% if page.description %}
                <p class="page-description">{{ page.description }}</p>
            {% endif %}
        </header>
    {% endif %}
    
    <div class="content">
        {{ content }}
    </div>
</article>
